name: Build and Release VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: vsix-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 22.21.x
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev pkg-config
          python -m pip install --upgrade pip setuptools

      - name: Install dependencies
        run: npm ci

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          python --version

      - name: Build extension
        run: npm run build

      - name: Compute VSIX metadata
        id: meta
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "${GITHUB_OUTPUT}"
          echo "version=$(node -p "require('./package.json').version")" >> "${GITHUB_OUTPUT}"

      - name: Package VSIX
        run: |
          mkdir -p .artifacts
          npx @vscode/vsce package --allow-package-secrets sendgrid --out ".artifacts/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.vsix"

      - name: Verify VSIX artifact
        run: ls -la .artifacts/

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}
          path: .artifacts/*.vsix
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .artifacts/*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
